[gcode_macro _print_profile_vars]
# NOTE:
# 2026-03-11 Last measured when the PETG offset is at a staggering -0.44, but I be a bit
# more conservative here first since it might be my own setup issue
variable_filament_z_offset: {
    'PLA': '0.00', # 50c
    'PETG': '0.12', # 65c
    'ABS': '0.18', # 80c
    }
gcode:
    # This section is required.  Do Not Delete.


[gcode_macro _ADJUST_Z_OFFSET]
gcode:
    {% set filament = params.FILAMENT %}
    {% set bed_type = params.BED_TYPE %}
    {% set filament_z_offset = printer["gcode_macro _print_profile_vars"].filament_z_offset[filament] %}

    {% if filament_z_offset %}
    SET_GCODE_OFFSET Z={filament_z_offset}
    {% endif %}

[gcode_macro BED_LEVEL_SANITY_CHECK]
gcode:
    M190 S60             ; heat the bed to reference temp
    M109 S180            ; heat the extruder

    G28                  ; home all axes
    G90                  ; absolute positioning

    PARK_CENTER_CENTER   ; Park the toolhead
    G1 Z1.2 F3600        ; Move the toolhead closer to bed
    Z_ENDSTOP_CALIBRATE  ; Start the Z endstop calibrate (for the UI)
