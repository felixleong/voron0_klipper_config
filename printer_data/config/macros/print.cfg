[gcode_macro PRINT_START]
#   Use PRINT_START for the slicer starting script - please customize for your slicer of choice
gcode:
    {% set target_bed = params.BED|int %}
    {% set target_extruder = params.EXTRUDER|int %}
    {% set filament = params.FILAMENT %}
    {% set bed_type = params.BED_TYPE %}
    {% set nozzle_diameter = params.NOZZLE_DIAMETER|default(0)|float %}

    {% set nozzle_diameter_setting = printer.save_variables.variables.nozzle_diameter|default(0)|float %}
    {% set extruder_ratio = printer.configfile.config.extruder.nozzle_diameter|float * 1.05 %}

    {% if nozzle_diameter != nozzle_diameter_setting %}
      M118 Nozzle Diameter Mismatch
      CANCEL_PRINT
    {% else %}
        G28                            ; home all axes
        G90                            ; absolute positioning
        G1 X45 Y1 F10000               ; Move to origin of intro line

        ; Setting up
        ;SET_FILAMENT_SENSOR SENSOR='Filament_Runout_Sensor' ENABLE=1 ; Reenable filament runout sensor

        ; Heating
        _STATUS_HEATING
        M104 S200                      ; heat the extruder (nozzle priming, remove gunk here)
        M190 S{target_bed}             ; heat the bed
        M109 S{target_extruder}        ; heat the extruder

        ; Post heating setup
        _ADJUST_Z_OFFSET FILAMENT='{filament}' BED_TYPE='{bed_type}'   ; Set Z offset adjustments

        ; Intro line
        _STATUS_PRINTING
        G92 E0                         ; Zero the extruder
        G1 Z{extruder_ratio} F10000    ; Move closer to bed
        G1 E10 F60                     ; Prime the nozzle
        G1 X75 E{10 + 1.2 * nozzle_diameter/ 0.2 } F750                ; Intro line

        G92 E0                         ; Zero the extruder
        G1 Z{extruder_ratio + 0.2} F1800 ; Retract and Z-hop
    {% endif %}

[gcode_macro PRINT_END]
#   Use PRINT_END for the slicer ending script - please customize for your slicer of choice
gcode:
    M400                           ; wait for buffer to clear
    G92 E0                         ; zero the extruder
    G1 E-4.0 F3600                 ; retract filament
    G91                            ; relative positioning

    #   Get Boundaries
    {% set max_x = printer.configfile.config["stepper_x"]["position_max"]|float %}
    {% set max_y = printer.configfile.config["stepper_y"]["position_max"]|float %}
    {% set max_z = printer.configfile.config["stepper_z"]["position_max"]|float %}

    #   Check end position to determine safe direction to move
    {% if printer.toolhead.position.x < (max_x - 25) %}
        {% set x_safe = 25.0 %}
    {% else %}
        {% set x_safe = -25.0 %}
    {% endif %}

    {% if printer.toolhead.position.y < (max_y - 25) %}
        {% set y_safe = 25.0 %}
    {% else %}
        {% set y_safe = -25.0 %}
    {% endif %}

    {% if printer.toolhead.position.z < (max_z - 2) %}
        {% set z_safe = 2.0 %}
    {% else %}
        {% set z_safe = max_z - printer.toolhead.position.z %}
    {% endif %}

    G0 Z{z_safe} F3600             ; move nozzle up
    G0 X{x_safe} Y{y_safe} F20000  ; move nozzle to remove stringing
    TURN_OFF_HEATERS
    M107                           ; turn off fan
    G90                            ; absolute positioning
    G0 X60 Y{max_y-10} F3600       ; park nozzle at rear

    ; Additional processing
    SET_GCODE_OFFSET Z_ADJUST=0	   ; Reset Z adjustment

    ; Set LEDs
    _STATUS_READY

[gcode_macro CANCEL_PRINT]
rename_existing: CANCEL_PRINT_BASE
gcode:
    CANCEL_PRINT_BASE

    {% set max_z = printer.configfile.config["stepper_z"]["position_max"]|float %}
    {% if printer.toolhead.position.z < (max_z - 5) %}
        {% set z_safe = 5.0 %}
    {% else %}
        {% set z_safe = max_z - printer.toolhead.position.z %}
    {% endif %}
    G91                            ; relative positioning
    G0 Z{z_safe} F3600             ; move nozzle up

    {% if printer["gcode_macro _STATUS_READY"] != null %}
        _STATUS_READY
    {% endif %}

[gcode_macro PAUSE]
rename_existing: PAUSE_BASE
gcode:
    PAUSE_BASE
    {% if printer["gcode_macro _STATUS_PAUSING"] != null %}
        _STATUS_PAUSING
    {% endif %}

[gcode_macro RESUME]
rename_existing: RESUME_BASE
gcode:
    RESUME_BASE
    {% if printer["gcode_macro _STATUS_PRINTING"] != null %}
        _STATUS_PRINTING
    {% endif %}
