[gcode_macro LOAD_FILAMENT]
gcode:
   M83                            ; set extruder to relative
   G1 E60 F300                    ; load
   G1 E15 F150                    ; prime nozzle with filament
   M82                            ; set extruder to absolute

[gcode_macro UNLOAD_FILAMENT]
gcode:
   M83                            ; set extruder to relative
   G1 E10 F300                    ; extrude a little to soften tip
   G1 E-40 F1800                  ; retract some, but not too much or it will jam
   M82                            ; set extruder to absolute

[gcode_macro TOGGLE_RUNOUT_SENSOR]
gcode:
   {% set new_sensor_status = 0 if printer['filament_switch_sensor Filament_Runout_Sensor'].enabled else 1 %}
   SET_FILAMENT_SENSOR SENSOR=Filament_Runout_Sensor ENABLE={new_sensor_status}
   RESPOND TYPE=command MSG='Filament Runout Enabled Status: {new_sensor_status}'

[gcode_macro FLOW_RATE_TEST]
gcode:
   {% set flow_rate = params.FLOW_RATE|float %}
   {% set feed_rate = flow_rate / 2.405594 * 60 %}
   {% set feed_length = params.feed|default(50)|int %}
   RESPOND TYPE=command MSG='Flow rate: {flow_rate}, feed_rate: {feed_rate}, feed_length: {feed_length}'

   _STATUS_BUSY
   M83                            ; set extruder to relative
   G1 E{feed_length} F{feed_rate} ; feed filament
   M82                            ; set extruder to absolute

   _STATUS_READY
   RESPOND TYPE=command MSG='Flow rate test extrusion completed'
